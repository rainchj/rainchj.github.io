<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon.png">
    <title>AI 증권차트분석</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            margin: 0;
            padding: 40px;
            color: #e2e8f0;
        }

        .container {
            max-width: 950px;
            margin: auto;
            background: rgba(30, 41, 59, 0.85);
            border-radius: 22px;
            padding: 45px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 42px;
            font-weight: 800;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .version {
            font-size: 18px;
            color: #94a3b8;
        }

        .container h2 {
            margin-top: 0;
            color: #7dd3fc;
            font-size: 26px;
            margin-bottom: 18px;
        }

        .container ul {
            padding-left: 24px;
            line-height: 1.9;
        }

        .container li {
            margin-bottom: 10px;
        }

        .highlight {
            color: #fbbf24;
            font-weight: bold;
        }

        .code-box {
            background: #020617;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 18px;
            margin-top: 15px;
            font-family: Consolas, monospace;
            color: #93c5fd;
            overflow-x: auto;
        }

        .footer {
            text-align: center;
            margin-top: 45px;
            color: #94a3b8;
            font-size: 15px;
            border-top: 1px solid #334155;
            padding-top: 22px;
        }

        .badge {
            display: inline-block;
            background: #0ea5e9;
            color: white;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 14px;
            margin-top: 10px;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            border-bottom: 1px dashed rgba(56, 189, 248, 0.5);
            transition: all 0.3s ease;
        }

        a:hover {
            color: #7dd3fc;
            border-bottom-color: #7dd3fc;
        }

        /* 과거 버전 접기 스타일 (최소화) */
        .toggle-btn-past {
            color: #38bdf8;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 15px;
            font-size: 14px;
            padding: 5px 0;
        }
        
        .toggle-btn-past:hover {
            text-decoration: underline;
        }

        .collapsible-content {
            display: none;
        }

        .collapsible-content.active {
            display: block;
        }

        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 20px;
                border-radius: 16px;
            }

            .title {
                font-size: 28px;
            }

            .container h2 {
                font-size: 22px;
            }

            .code-box {
                padding: 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
